<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Depositar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body style="padding: 0;">
  <div class="container">
    <!-- Page Title -->
    <div class="page-title">
      <button class="back-btn" onclick="window.location.href='menu.html'">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
      <h2>Depositar</h2>
    </div>

    <!-- Balance Display -->
    <div class="stats-card" style="margin-top: 0;">
      <div style="text-align: center;">
        <div style="color: #6B7280; font-size: 14px; margin-bottom: 8px;">Saldo disponible</div>
        <div class="stats-amount" id="saldo-deposito">$60.000</div>
      </div>
    </div>

    <!-- Amount Input Section -->
    <div class="send-money-container">
      <div class="amount-display">
        <span class="amount-currency">$</span>
        <input type="text" id="monto-display" class="amount-value" value="0" 
               style="border: none; background: transparent; text-align: center; width: 100%; outline: none;">
      </div>

      <!-- Numpad -->
      <div class="numpad">
        <button class="numpad-btn" onclick="addNumber('1')">1</button>
        <button class="numpad-btn" onclick="addNumber('2')">2</button>
        <button class="numpad-btn" onclick="addNumber('3')">3</button>
        <button class="numpad-btn" onclick="addNumber('4')">4</button>
        <button class="numpad-btn" onclick="addNumber('5')">5</button>
        <button class="numpad-btn" onclick="addNumber('6')">6</button>
        <button class="numpad-btn" onclick="addNumber('7')">7</button>
        <button class="numpad-btn" onclick="addNumber('8')">8</button>
        <button class="numpad-btn" onclick="addNumber('9')">9</button>
        <button class="numpad-btn" onclick="clearAmount()">C</button>
        <button class="numpad-btn" onclick="addNumber('0')">0</button>
        <button class="numpad-btn" onclick="deleteNumber()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z" />
          </svg>
        </button>
      </div>

      <!-- Hidden form for compatibility -->
      <form id="formDeposito" style="display: none;">
        <input type="number" id="monto-deposito" min="1">
      </form>

      <button type="button" id="btnDepositar" class="btn btn-success w-100" style="margin-top: 20px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
        </svg>
        Realizar depósito
      </button>

      <!-- Leyenda con monto depositado -->
      <div id="leyenda-deposito" class="alert alert-success mt-3" style="display: none;"></div>

      <!-- Contenedor para alertas Bootstrap -->
      <div id="alert-container" class="mt-3"></div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="menu.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span>Inicio</span>
      </a>
      <a href="transactions.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        <span>Estadísticas</span>
      </a>
      <a href="sendmoney.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        <span>Contactos</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        <span>Perfil</span>
      </a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="app.js"></script>
  <script>
    // Numpad functions
    let currentAmount = '0';
    
    function updateDisplay() {
      const formatted = parseInt(currentAmount).toLocaleString('es-CL');
      document.getElementById('monto-display').value = formatted;
      document.getElementById('monto-deposito').value = currentAmount;
    }
    
    function addNumber(num) {
      if (currentAmount === '0') {
        currentAmount = num;
      } else if (currentAmount.length < 10) {
        currentAmount += num;
      }
      updateDisplay();
    }
    
    function deleteNumber() {
      if (currentAmount.length > 1) {
        currentAmount = currentAmount.slice(0, -1);
      } else {
        currentAmount = '0';
      }
      updateDisplay();
    }
    
    function clearAmount() {
      currentAmount = '0';
      updateDisplay();
    }
    
    // Handle deposit button
    document.getElementById('btnDepositar').addEventListener('click', function() {
      const monto = parseInt(currentAmount);
      if (monto > 0) {
        document.getElementById('monto-deposito').value = monto;
        document.getElementById('formDeposito').dispatchEvent(new Event('submit'));
      } else {
        mostrarAlertaBootstrap('#alert-container', 'error', 'Ingrese un monto válido');
      }
    });
  </script>
</body>
</html>
