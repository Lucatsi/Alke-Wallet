<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Inicio de Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body style="background: linear-gradient(180deg, #7C3AED 0%, #7C3AED 50%, #F5F3FF 50%); padding: 0;">
  <div class="container">
    <div class="login-container">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
          </svg>
        </div>
        <h1 class="login-title">Alke Wallet</h1>
      </div>

      <!-- Login Card -->
      <div class="login-card animate-fade-in">
        <h3>Bienvenido</h3>
        
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
          </div>

          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-primary w-100" style="margin-top: 10px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
            </svg>
            Iniciar sesión
          </button>
        </form>

        <!-- Contenedor para alertas Bootstrap -->
        <div id="alert-container" class="mt-3"></div>

        <div style="text-align: center; margin-top: 24px;">
          <p style="color: #6B7280; font-size: 14px;">
            ¿No tienes cuenta? <a href="#" style="color: #7C3AED; font-weight: 600; text-decoration: none;">Regístrate</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
