<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Inicio de Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body style="background: linear-gradient(180deg, #7C3AED 0%, #7C3AED 50%, #F5F3FF 50%); padding: 0;">
  <div class="container" style="background: transparent; box-shadow: none;">
    <div class="login-container">
      <!-- Logo -->
      <div class="login-logo" style="margin-top: 60px;">
        <img src="image/Captura de pantalla 2025-12-08 224510.png" alt="Alke Wallet Logo" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 16px;">
      </div>

      <!-- Login Card -->
      <div class="login-card animate-fade-in">
        <h3>Bienvenido</h3>
        
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
          </div>

          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-primary w-100" style="margin-top: 10px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
            </svg>
            Iniciar sesión
          </button>
        </form>

        <!-- Contenedor para alertas Bootstrap -->
        <div id="alert-container" class="mt-3"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
